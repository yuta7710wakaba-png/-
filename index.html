<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#dff4ff">
<title>みんなでみつけよう！ Ver1.3</title>
<link rel="stylesheet" href="style.css?v=1.3.0">
</head>
<body>
<div id="app">
  <section id="menu" class="screen active" aria-label="教材メニュー">
    <div class="menu-wrap">
      <div class="title">
        <h1>みんなでみつけよう！</h1>
        <p>大きな画面で、見て・考えて・伝える療育教材</p>
      </div>

      <article class="material-card">
        <div>
          <h2>なにがかわった？</h2>
          <div class="stars" aria-label="難易度1">★☆☆☆☆</div>
          <div class="aims">
            <span class="aim">共同注意</span>
            <span class="aim">視覚探索</span>
            <span class="aim">少し前を思い出す</span>
          </div>
        </div>
        <button id="startBtn" class="start-btn" type="button">▶ はじめる</button>
      </article>

      <div class="note">Ver1.3｜電子紙芝居風のページめくりに対応。全7問に増えました。電子紙芝居のように進められます。</div>
    </div>
  </section>

  <section id="viewer" class="screen" aria-label="教材表示画面">
    <div id="paperStage"><div id="nextScene" class="paper-page under-page" aria-hidden="true"></div><div id="scene" class="paper-page top-page"></div><div id="pageFold" aria-hidden="true"></div></div>
    <div class="nav-zone left" id="prevZone" aria-label="前へ戻る"></div>
    <div class="nav-zone right" id="nextZone" aria-label="次へ進む"></div>
    <button id="closeBtn" class="close-btn" type="button" aria-label="閉じる">×</button>
    <div id="counter" class="counter">1/8</div>
    <div id="hint" class="hint">画面を長押しすると先生用メニューが開きます</div>

    <div id="teacherMenu" aria-hidden="true">
      <div class="panel">
        <h3>先生用メニュー</h3>
        <p>普段は画面左右のタップだけで操作できます。</p>
        <div class="row">
          <button id="firstBtn" type="button">最初に戻る</button>
          <button id="answerBtn" class="primary" type="button">変化を強調</button>
          <button id="fullscreenBtn" type="button">全画面表示</button>
          <button id="resumeBtn" type="button">閉じる</button>
          <button id="exitBtn" class="danger" type="button">教材を終了</button>
        </div>
      </div>
    </div>
  </section>
</div>
<script src="data.js?v=1.3.0"></script>
<script src="script.js?v=1.3.0"></script>
</body>
</html>
